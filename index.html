<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 올인원 도우미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        .desk {
            border: 2px solid #a5b4fc;
            min-height: 80px;
            transition: all 0.2s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
        }
        .desk.empty {
            border-style: dashed;
            background-color: #f1f5f9;
        }
        .desk.selected {
            background-color: #818cf8;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .print-mode {
            background-color: white !important;
            color: black !important;
            border: 2px solid black !important;
        }
        .print-mode .empty {
            background-color: #f0f0f0 !important;
            border: 2px dashed black !important;
        }
        .shuffle-box {
            min-height: 100px;
            font-size: 2rem;
            font-weight: bold;
            border: 2px dashed #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }
        .group-card {
            min-height: 150px;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-600">우리반 올인원 도우미</h1>
            <p class="text-slate-500 mt-2">자리 배치와 오늘의 한마디로 활기찬 학급을 만들어 보세요!</p>
        </header>

        <!-- 메뉴 버튼 -->
        <nav class="flex justify-center flex-wrap gap-4 mb-8">
            <button id="menu-seating" class="px-6 py-2 bg-indigo-500 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75">자리 배치</button>
            <button id="menu-daily" class="px-6 py-2 bg-white text-indigo-500 font-semibold rounded-lg shadow-md hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75">오늘의 한마디</button>
            <button id="menu-picker" class="px-6 py-2 bg-white text-indigo-500 font-semibold rounded-lg shadow-md hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75">랜덤 뽑기</button>
        </nav>

        <!-- 1. 자리 배치 프로그램 -->
        <main id="seating-chart-section">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- 제어판 -->
                <aside class="lg:col-span-1 bg-white p-6 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-bold mb-6 border-b-2 pb-2 border-indigo-200">설정</h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label for="student-file" class="block text-sm font-medium text-slate-700 mb-1">1. 학생 명단 (txt)</label>
                            <input type="file" id="student-file" accept=".txt" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"/>
                            <p class="text-xs text-slate-400 mt-1">예: 1,김민준</p>
                        </div>

                        <div>
                            <label for="total-seats" class="block text-sm font-medium text-slate-700 mb-1">2. 전체 좌석 수</label>
                            <input type="number" id="total-seats" value="30" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>

                        <div>
                            <span class="block text-sm font-medium text-slate-700 mb-2">3. 배치 형태</span>
                            <div class="flex gap-4">
                                <label class="flex items-center">
                                    <input type="radio" name="layout-type" value="pairs" checked class="focus:ring-indigo-500 h-4 w-4 text-indigo-600 border-slate-300">
                                    <span class="ml-2">짝꿍 (2인)</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="radio" name="layout-type" value="single" class="focus:ring-indigo-500 h-4 w-4 text-indigo-600 border-slate-300">
                                    <span class="ml-2">홀로 (1인)</span>
                                </label>
                            </div>
                             <label for="cols" class="block text-sm font-medium text-slate-700 mt-2">분단(열) 수</label>
                             <input type="number" id="cols" value="6" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                        
                        <button id="apply-settings" class="w-full bg-indigo-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-indigo-600 transition-colors">자리 생성</button>
                    </div>

                    <h3 class="text-xl font-bold mt-8 mb-4 border-b-2 pb-2 border-indigo-200">기능</h3>
                    <div class="grid grid-cols-2 gap-3">
                         <button id="randomize" class="bg-green-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-600">랜덤 배치</button>
                         <button id="swap-mode" class="bg-orange-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-orange-600">자리 바꾸기</button>
                         
                         <div class="col-span-2 space-y-2 border-t pt-3 mt-1">
                             <div class="flex gap-2 text-xs font-semibold text-slate-600 mb-1">
                                 <label class="flex items-center"><input type="radio" name="order-direction" value="horizontal" checked class="mr-1"> 가로방향</label>
                                 <label class="flex items-center"><input type="radio" name="order-direction" value="vertical" class="mr-1"> 세로방향</label>
                             </div>
                             <button id="order-by-number" class="w-full bg-indigo-400 text-white font-bold py-2 px-4 rounded-lg hover:bg-indigo-500">번호순 자리배치</button>
                         </div>

                         <button id="save" class="bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600 mt-2">저장</button>
                         <button id="load" class="bg-gray-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600 mt-2">불러오기</button>
                         <button id="export-pdf" class="col-span-2 bg-purple-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-purple-600">PDF로 내보내기</button>
                    </div>
                    <input type="file" id="load-file-input" class="hidden" accept=".txt">
                    <div class="mt-3 flex items-center justify-center">
                        <input type="checkbox" id="teacher-view-checkbox" class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                        <label for="teacher-view-checkbox" class="ml-2 block text-sm text-slate-700 font-medium">교사 시점 (상하좌우 반전)</label>
                    </div>
                     <div id="status-message" class="mt-4 text-sm font-medium text-slate-600 h-6"></div>
                </aside>

                <!-- 자리 배치도 -->
                <div id="seating-chart-area" class="lg:col-span-3 bg-white p-6 rounded-xl shadow-lg">
                    <div class="bg-gray-200 text-center py-2 rounded-t-lg font-bold text-lg text-slate-600">칠판</div>
                    <div id="seating-chart-grid" class="p-4 grid gap-4">
                        <div class="col-span-full h-64 flex items-center justify-center text-slate-400">
                            학생 명단 파일을 업로드하고 '자리 생성' 버튼을 눌러주세요.
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- 2. 오늘의 한마디 -->
        <main id="daily-word-section" class="hidden">
            <div class="bg-white p-8 rounded-xl shadow-lg max-w-4xl mx-auto">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-indigo-600">오늘의 한마디</h2>
                    <p class="text-slate-500 mt-2">AI가 매일 새로운 지혜를 추천해 드립니다.</p>
                    <button id="get-recommendation" class="mt-4 px-6 py-2 bg-indigo-500 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-600">새로운 추천 받기</button>
                </div>
                
                <div id="recommendation-content" class="space-y-8">
                    <!-- AI 추천 내용이 여기에 표시됩니다 -->
                    <div id="loading-spinner" class="hidden text-center">
                        <svg class="animate-spin h-8 w-8 text-indigo-500 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <p class="mt-2 text-slate-500">지혜를 찾고 있습니다...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- 3. 랜덤 뽑기 -->
        <main id="random-picker-section" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- 모둠 편성 -->
                <div class="bg-white p-6 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-bold mb-4 text-center text-teal-600">모둠 편성</h2>
                    <div class="flex items-center gap-2 mb-4">
                        <label for="group-count" class="font-medium">모둠 수:</label>
                        <input type="number" id="group-count" value="6" class="w-20 rounded-md border-slate-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        <button id="form-groups-btn" class="flex-grow bg-teal-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-teal-600">편성 시작</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <button id="save-groups-btn" class="text-sm bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600">저장(.txt)</button>
                        <button id="load-groups-btn" class="text-sm bg-gray-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600">불러오기</button>
                        <button id="export-groups-pdf" class="text-sm bg-purple-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-purple-600">PDF 내보내기</button>
                    </div>
                    <input type="file" id="load-groups-input" class="hidden" accept=".txt">
                    <div id="group-shuffle-box" class="shuffle-box text-teal-500 mb-4">모둠 편성을 시작하세요!</div>
                    <div id="group-results" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
                <!-- 발표자 뽑기 -->
                <div class="bg-white p-6 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-bold mb-4 text-center text-sky-600">발표자 뽑기</h2>
                    <div class="mb-4 space-y-3">
                       <button id="pick-presenter-btn" class="w-full bg-sky-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-sky-600">발표자 뽑기!</button>
                       <div class="flex items-center justify-center">
                           <input type="checkbox" id="exclude-picked-checkbox" checked class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                           <label for="exclude-picked-checkbox" class="ml-2 block text-sm text-slate-700 font-medium">뽑힌 사람 제외하기</label>
                       </div>
                       <button id="reset-presenter-list" class="w-full text-xs text-slate-500 hover:text-slate-700">초기화</button>
                    </div>
                    <div id="presenter-shuffle-box" class="shuffle-box text-sky-500 mb-4">오늘의 발표자는?</div>
                    <p id="presenter-status" class="text-center text-sm text-slate-500 h-5"></p>
                     <!-- 뽑힌 학생 명단 표시 영역 -->
                    <div class="mt-4 border-t pt-4">
                        <h4 class="font-bold text-center text-slate-600 mb-2">뽑힌 학생 명단</h4>
                        <div id="picked-presenters-list" class="text-center text-sm text-slate-500 flex flex-wrap justify-center gap-2">
                            <p>아직 뽑힌 학생이 없습니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script>
        const { jsPDF } = window.jspdf;

        // --- 전역 설정 및 상태 ---
        const apiKey = ""; // 실행 환경에서 자동으로 주입됩니다.
        let students = [];
        let seatAssignments = []; 
        let isSwapMode = false;
        let firstSelection = null;
        let availableForPicking = [];
        let pickedPresenters = [];
        let currentGroups = [];
        let isShuffling = false;

        // --- DOM 요소 ---
        const menuSeating = document.getElementById('menu-seating');
        const menuDaily = document.getElementById('menu-daily');
        const menuPicker = document.getElementById('menu-picker');
        const seatingSection = document.getElementById('seating-chart-section');
        const dailySection = document.getElementById('daily-word-section');
        const pickerSection = document.getElementById('random-picker-section');
        const fileInput = document.getElementById('student-file');
        const totalSeatsInput = document.getElementById('total-seats');
        const colsInput = document.getElementById('cols');
        const applySettingsBtn = document.getElementById('apply-settings');
        const randomizeBtn = document.getElementById('randomize');
        const swapModeBtn = document.getElementById('swap-mode');
        const orderByNumberBtn = document.getElementById('order-by-number');
        const saveBtn = document.getElementById('save');
        const loadBtn = document.getElementById('load');
        const loadFileInput = document.getElementById('load-file-input');
        const exportPdfBtn = document.getElementById('export-pdf');
        const grid = document.getElementById('seating-chart-grid');
        const statusMessage = document.getElementById('status-message');
        const getRecommendationBtn = document.getElementById('get-recommendation');
        const recommendationContent = document.getElementById('recommendation-content');
        const loadingSpinner = document.getElementById('loading-spinner');
        const groupCountInput = document.getElementById('group-count');
        const formGroupsBtn = document.getElementById('form-groups-btn');
        const groupShuffleBox = document.getElementById('group-shuffle-box');
        const groupResults = document.getElementById('group-results');
        const saveGroupsBtn = document.getElementById('save-groups-btn');
        const loadGroupsBtn = document.getElementById('load-groups-btn');
        const loadGroupsInput = document.getElementById('load-groups-input');
        const exportGroupsPdfBtn = document.getElementById('export-groups-pdf');
        const pickPresenterBtn = document.getElementById('pick-presenter-btn');
        const excludePickedCheckbox = document.getElementById('exclude-picked-checkbox');
        const resetPresenterListBtn = document.getElementById('reset-presenter-list');
        const presenterShuffleBox = document.getElementById('presenter-shuffle-box');
        const presenterStatus = document.getElementById('presenter-status');
        const pickedPresentersList = document.getElementById('picked-presenters-list');

        // --- 메뉴 전환 로직 ---
        function switchView(view) {
            [seatingSection, dailySection, pickerSection].forEach(s => s.classList.add('hidden'));
            [menuSeating, menuDaily, menuPicker].forEach(m => {
                m.classList.replace('bg-indigo-500', 'bg-white');
                m.classList.replace('text-white', 'text-indigo-500');
            });

            const targetSection = view === 'seating' ? seatingSection : view === 'daily' ? dailySection : pickerSection;
            const targetMenu = view === 'seating' ? menuSeating : view === 'daily' ? menuDaily : menuPicker;

            targetSection.classList.remove('hidden');
            targetMenu.classList.replace('bg-white', 'bg-indigo-500');
            targetMenu.classList.replace('text-indigo-500', 'text-white');
        }

        menuSeating.addEventListener('click', () => switchView('seating'));
        menuDaily.addEventListener('click', () => switchView('daily'));
        menuPicker.addEventListener('click', () => switchView('picker'));

        // --- 공통 메시지 출력 ---
        function showMessage(msg, colorType = 'slate') {
            const colorMap = {
                red: 'text-red-600',
                green: 'text-green-600',
                blue: 'text-blue-600',
                slate: 'text-slate-600'
            };
            statusMessage.textContent = msg;
            statusMessage.className = `mt-4 text-sm font-medium ${colorMap[colorType] || 'text-slate-600'} h-6`;
        }

        // --- 자리 배치 프로그램 로직 ---
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                students = text.split('\n').filter(line => line.trim() !== '').map(line => {
                    const [number, name] = line.split(/[,，]/).map(s => s.trim());
                    return { number, name };
                });
                availableForPicking = [...students];
                pickedPresenters = [];
                renderPickedPresenters();
                showMessage(`학생 ${students.length}명의 명단을 불러왔습니다.`, 'green');
                presenterStatus.textContent = `현재 ${availableForPicking.length}명 중 1명 뽑기`;
            };
            reader.readAsText(file, 'UTF-8');
        });

        applySettingsBtn.addEventListener('click', generateGrid);

        function generateGrid() {
            const totalSeats = parseInt(totalSeatsInput.value, 10);
            const layoutType = document.querySelector('input[name="layout-type"]:checked').value;
            const cols = parseInt(colsInput.value, 10);

            if (isNaN(totalSeats) || totalSeats <= 0 || isNaN(cols) || cols <= 0) {
                showMessage('좌석 수와 분단 수는 0보다 커야 합니다.', 'red');
                return;
            }
            
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            seatAssignments = Array(totalSeats).fill(null).map(() => ({ studentIndex: null }));

            for (let i = 0; i < totalSeats; i++) {
                const desk = document.createElement('div');
                desk.classList.add('desk', 'p-2', 'rounded-lg', 'break-all');
                if (layoutType === 'pairs' && (i % 2 !== 0)) {
                    desk.style.marginLeft = '-1rem'; 
                    desk.style.borderLeft = 'none';
                    const prevDesk = grid.children[i-1];
                    if (prevDesk) prevDesk.style.borderRight = 'none';
                }
                desk.dataset.seatIndex = i;
                desk.addEventListener('click', handleDeskClick);
                grid.appendChild(desk);
            }
            renderSeatAssignments();
            showMessage('자리가 생성되었습니다. 명단을 배치하세요.', 'blue');
        }
        
        function renderSeatAssignments() {
            const desks = grid.querySelectorAll('.desk');
            desks.forEach((desk, seatIndex) => {
                const assignment = seatAssignments[seatIndex];
                if (assignment && assignment.studentIndex !== null) {
                    const student = students[assignment.studentIndex];
                    desk.textContent = `${student.number}. ${student.name}`;
                    desk.classList.remove('empty');
                } else {
                    desk.textContent = '';
                    desk.classList.add('empty');
                }
            });
        }

        randomizeBtn.addEventListener('click', () => {
            if (students.length === 0 || seatAssignments.length === 0) {
                showMessage('명단 업로드와 자리 생성이 선행되어야 합니다.', 'red');
                return;
            }
            let studentIndices = students.map((_, i) => i);
            for (let i = studentIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [studentIndices[i], studentIndices[j]] = [studentIndices[j], studentIndices[i]];
            }
            seatAssignments.forEach(a => a.studentIndex = null);
            for (let i = 0; i < Math.min(students.length, seatAssignments.length); i++) {
                seatAssignments[i].studentIndex = studentIndices[i];
            }
            renderSeatAssignments();
            showMessage('자리를 랜덤으로 배치했습니다.', 'green');
        });

        orderByNumberBtn.addEventListener('click', () => {
            if (students.length === 0 || seatAssignments.length === 0) {
                showMessage('명단 업로드와 자리 생성이 선행되어야 합니다.', 'red');
                return;
            }
            const direction = document.querySelector('input[name="order-direction"]:checked').value;
            const cols = parseInt(colsInput.value, 10);
            const totalSeats = seatAssignments.length;
            const rows = Math.ceil(totalSeats / cols);
            const sortedIndices = [...students]
                .sort((a, b) => parseInt(a.number) - parseInt(b.number))
                .map(s => students.indexOf(s));

            seatAssignments.forEach(a => a.studentIndex = null);

            if (direction === 'horizontal') {
                for (let i = 0; i < sortedIndices.length && i < totalSeats; i++) {
                    seatAssignments[i].studentIndex = sortedIndices[i];
                }
            } else {
                let currentIdx = 0;
                for (let c = 0; c < cols; c++) {
                    for (let r = 0; r < rows; r++) {
                        const seatIdx = r * cols + c;
                        if (seatIdx < totalSeats && currentIdx < sortedIndices.length) {
                            seatAssignments[seatIdx].studentIndex = sortedIndices[currentIdx++];
                        }
                    }
                }
            }
            renderSeatAssignments();
            showMessage(`번호순(${direction === 'horizontal' ? '가로' : '세로'}) 배치 완료.`, 'green');
        });

        swapModeBtn.addEventListener('click', () => {
            isSwapMode = !isSwapMode;
            if (isSwapMode) {
                swapModeBtn.classList.add('ring-4', 'ring-orange-300');
                swapModeBtn.textContent = '바꾸기 모드 ON';
                showMessage('바꿀 첫 번째 자리를 선택하세요.', 'blue');
            } else {
                swapModeBtn.classList.remove('ring-4', 'ring-orange-300');
                swapModeBtn.textContent = '자리 바꾸기';
                if (firstSelection) firstSelection.classList.remove('selected');
                firstSelection = null;
                showMessage('', 'slate');
            }
        });

        function handleDeskClick(event) {
            if (!isSwapMode) return;
            const clickedDesk = event.currentTarget;
            if (!firstSelection) {
                firstSelection = clickedDesk;
                firstSelection.classList.add('selected');
                showMessage('바뀔 두 번째 자리를 선택하세요.', 'blue');
            } else {
                if (firstSelection === clickedDesk) { 
                    firstSelection.classList.remove('selected');
                    firstSelection = null;
                    showMessage('자리 선택 취소.', 'slate');
                    return;
                }
                const firstSeatIndex = parseInt(firstSelection.dataset.seatIndex, 10);
                const secondSeatIndex = parseInt(clickedDesk.dataset.seatIndex, 10);
                const temp = seatAssignments[firstSeatIndex].studentIndex;
                seatAssignments[firstSeatIndex].studentIndex = seatAssignments[secondSeatIndex].studentIndex;
                seatAssignments[secondSeatIndex].studentIndex = temp;
                renderSeatAssignments();
                firstSelection.classList.remove('selected');
                firstSelection = null;
                isSwapMode = false;
                swapModeBtn.classList.remove('ring-4', 'ring-orange-300');
                swapModeBtn.textContent = '자리 바꾸기';
                showMessage('자리를 성공적으로 바꿨습니다.', 'green');
            }
        }

        saveBtn.addEventListener('click', () => {
            if (students.length === 0 || seatAssignments.length === 0) {
                showMessage('저장할 데이터가 없습니다.', 'red');
                return;
            }
            const meta = `#META\ntotalSeats:${totalSeatsInput.value}\ncols:${colsInput.value}\nlayoutType:${document.querySelector('input[name="layout-type"]:checked').value}`;
            const studentData = '#STUDENTS\n' + students.map(s => `${s.number},${s.name}`).join('\n');
            const assignmentData = '#ASSIGNMENTS\n' + seatAssignments.map((a, i) => `${i},${a.studentIndex}`).join('\n');
            const blob = new Blob([`${meta}\n\n${studentData}\n\n${assignmentData}`], { type: 'text/plain;charset=utf-8' });
            const today = new Date();
            const fileName = `${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}.txt`;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            showMessage('자리 배치를 파일로 저장했습니다.', 'green');
        });
        
        loadBtn.addEventListener('click', () => loadFileInput.click());

        loadFileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const lines = e.target.result.split('\n').map(l => l.trim());
                    const metaIdx = lines.indexOf('#META');
                    const studIdx = lines.indexOf('#STUDENTS');
                    const assIdx = lines.indexOf('#ASSIGNMENTS');
                    if (metaIdx === -1 || studIdx === -1 || assIdx === -1) throw new Error('파일 형식이 맞지 않습니다.');

                    const meta = {};
                    lines.slice(metaIdx + 1, studIdx).forEach(l => {
                        const [k, v] = l.split(':');
                        if (k && v) meta[k] = v;
                    });
                    totalSeatsInput.value = meta.totalSeats;
                    colsInput.value = meta.cols;
                    const radio = document.querySelector(`input[name="layout-type"][value="${meta.layoutType}"]`);
                    if (radio) radio.checked = true;

                    students = lines.slice(studIdx + 1, assIdx).filter(l => l).map(l => {
                        const [num, name] = l.split(',');
                        return { number: num, name };
                    });
                    availableForPicking = [...students];
                    
                    generateGrid(); 
                    const assignments = Array(parseInt(meta.totalSeats)).fill(null).map(() => ({ studentIndex: null }));
                    lines.slice(assIdx + 1).filter(l => l).forEach(l => {
                        const [s, st] = l.split(',');
                        if (assignments[s]) assignments[s].studentIndex = st === 'null' ? null : parseInt(st);
                    });
                    seatAssignments = assignments;
                    renderSeatAssignments();
                    showMessage('자리 배치를 불러왔습니다.', 'green');
                } catch (err) {
                    showMessage('불러오기 실패: ' + err.message, 'red');
                } finally {
                    event.target.value = ''; 
                }
            };
            reader.readAsText(file, 'UTF-8');
        });

        exportPdfBtn.addEventListener('click', () => {
            const chartArea = document.getElementById('seating-chart-area');
            const chartGrid = document.getElementById('seating-chart-grid');
            const isTeacherView = document.getElementById('teacher-view-checkbox').checked;
            if (chartGrid.children.length < 2) return showMessage('내보낼 배치도가 없습니다.', 'red');

            const desks = chartArea.querySelectorAll('.desk');
            desks.forEach(d => d.classList.add('print-mode'));
            const chalkboard = chartArea.querySelector('.bg-gray-200');

            if (isTeacherView) {
                if (chalkboard) chartArea.appendChild(chalkboard);
                chartGrid.style.transform = 'rotate(180deg)';
                desks.forEach(desk => desk.style.transform = 'rotate(180deg)');
            }

            html2canvas(chartArea, { scale: 2 }).then(canvas => {
                const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
                pdf.save(`자리배치도_${new Date().toLocaleDateString()}.pdf`);
            }).finally(() => {
                desks.forEach(d => d.classList.remove('print-mode'));
                if (isTeacherView) {
                    if (chalkboard) chartArea.insertBefore(chalkboard, chartGrid);
                    chartGrid.style.transform = '';
                    desks.forEach(desk => desk.style.transform = '');
                }
            });
        });

        // --- 오늘의 한마디 (Gemini API) ---
        getRecommendationBtn.addEventListener('click', fetchRecommendation);

        async function fetchRecommendation() {
            loadingSpinner.classList.remove('hidden');
            recommendationContent.innerHTML = '';
            recommendationContent.appendChild(loadingSpinner);

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const systemPrompt = `당신은 한국 학생들을 위한 동기부여 전문가입니다. 학생들에게 영감을 줄 수 있는 사자성어 1개와 위인 명언 1개를 추천해주세요. JSON 형식: { "idiom": { "hanja": "漢字", "hangeul": "독음", "meaning": "뜻" }, "quote": { "text": "명언", "author": "인물" } }`;
            const payload = {
                contents: [{ parts: [{ text: "오늘의 사자성어와 명언을 추천해줘." }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            const maxRetries = 5;
            let currentRetry = 0;

            const callWithRetry = async () => {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`API 오류: ${response.status}`);
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error('응답 데이터 없음');
                    
                    const data = JSON.parse(text);
                    recommendationContent.innerHTML = `
                        <div class="p-6 bg-indigo-50 rounded-lg">
                            <h3 class="text-xl font-bold text-indigo-800">오늘의 사자성어</h3>
                            <p class="text-4xl font-bold my-3">${data.idiom.hanja} <span class="text-2xl font-medium text-slate-600">(${data.idiom.hangeul})</span></p>
                            <p class="text-slate-700">${data.idiom.meaning}</p>
                        </div>
                        <div class="p-6 bg-green-50 rounded-lg">
                            <h3 class="text-xl font-bold text-green-800">오늘의 명언</h3>
                            <p class="text-2xl italic my-3">"${data.quote.text}"</p>
                            <p class="text-right font-semibold text-slate-600">- ${data.quote.author} -</p>
                        </div>
                    `;
                } catch (error) {
                    if (currentRetry < maxRetries) {
                        currentRetry++;
                        setTimeout(callWithRetry, Math.pow(2, currentRetry - 1) * 1000);
                    } else {
                        recommendationContent.innerHTML = `<p class="text-red-500 text-center">지혜를 불러오지 못했습니다. (오류: ${error.message})</p>`;
                    }
                } finally {
                    if (currentRetry === 0 || currentRetry === maxRetries) loadingSpinner.classList.add('hidden');
                }
            };
            callWithRetry();
        }

        // --- 랜덤 뽑기 로직 ---
        function runShuffleAnimation(element, list, duration = 2000) {
            if (isShuffling || list.length === 0) return Promise.resolve();
            isShuffling = true;
            let interval = setInterval(() => {
                element.textContent = list[Math.floor(Math.random() * list.length)].name;
            }, 80);
            return new Promise(resolve => {
                setTimeout(() => {
                    clearInterval(interval);
                    isShuffling = false;
                    resolve();
                }, duration);
            });
        }

        formGroupsBtn.addEventListener('click', async () => {
            if (students.length === 0) return showMessage('명단을 먼저 업로드하세요.', 'red');
            const count = parseInt(groupCountInput.value);
            if (count <= 0 || count > students.length) return showMessage('유효하지 않은 모둠 수입니다.', 'red');

            groupResults.innerHTML = '';
            await runShuffleAnimation(groupShuffleBox, students);
            
            const shuffled = [...students].sort(() => Math.random() - 0.5);
            const groups = Array.from({ length: count }, () => []);
            shuffled.forEach((s, i) => groups[i % count].push(s));
            
            groupShuffleBox.textContent = "편성 완료!";
            groupResults.innerHTML = groups.map((g, i) => `
                <div class="group-card bg-slate-50 p-3 rounded-lg border">
                    <h4 class="font-bold text-teal-700 border-b mb-2 pb-1">${i + 1} 모둠</h4>
                    ${g.map(s => `<p class="text-sm">${s.number}. ${s.name}</p>`).join('')}
                </div>
            `).join('');
            currentGroups = groups;
        });

        saveGroupsBtn.addEventListener('click', () => {
            if (currentGroups.length === 0) return;
            const content = currentGroups.map((g, i) => `#GROUP:${i+1}\n${g.map(s => `${s.number},${s.name}`).join('\n')}`).join('\n\n');
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `모둠편성_${new Date().toISOString().slice(0,10)}.txt`;
            link.click();
        });

        loadGroupsBtn.addEventListener('click', () => loadGroupsInput.click());
        loadGroupsInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const text = ev.target.result;
                    const blocks = text.split('#GROUP:').filter(b => b.trim());
                    currentGroups = blocks.map(b => {
                        const lines = b.trim().split('\n');
                        lines.shift();
                        return lines.map(l => {
                            const [num, name] = l.split(',');
                            return { number: num, name };
                        });
                    });
                    groupResults.innerHTML = currentGroups.map((g, i) => `
                        <div class="group-card bg-slate-50 p-3 rounded-lg border">
                            <h4 class="font-bold text-teal-700 border-b mb-2 pb-1">${i + 1} 모둠</h4>
                            ${g.map(s => `<p class="text-sm">${s.number}. ${s.name}</p>`).join('')}
                        </div>
                    `).join('');
                    groupShuffleBox.textContent = "불러오기 완료";
                } catch { showMessage('모둠 파일 형식 오류', 'red'); }
            };
            reader.readAsText(file, 'UTF-8');
        });

        exportGroupsPdfBtn.addEventListener('click', () => {
            const results = document.getElementById('group-results');
            if (!results.children.length) return;
            html2canvas(results, { scale: 2 }).then(canvas => {
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [canvas.width, canvas.height + 40] });
                pdf.text("모둠 편성 결과", canvas.width / 2, 25, { align: "center" });
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 40, canvas.width, canvas.height);
                pdf.save("모둠편성결과.pdf");
            });
        });

        pickPresenterBtn.addEventListener('click', async () => {
            if (availableForPicking.length === 0) return presenterShuffleBox.textContent = "전원 당첨!";
            await runShuffleAnimation(presenterShuffleBox, availableForPicking);
            const idx = Math.floor(Math.random() * availableForPicking.length);
            const winner = availableForPicking[idx];
            presenterShuffleBox.textContent = winner.name;
            presenterShuffleBox.classList.add('text-red-500');
            pickedPresenters.push(winner);
            renderPickedPresenters();
            if (excludePickedCheckbox.checked) availableForPicking.splice(idx, 1);
            presenterStatus.textContent = `현재 ${availableForPicking.length}명 중 1명 뽑기`;
        });

        function renderPickedPresenters() {
            pickedPresentersList.innerHTML = pickedPresenters.length ? 
                pickedPresenters.map(s => `<span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold">${s.name}</span>`).join('') :
                '<p>아직 뽑힌 학생이 없습니다.</p>';
        }

        resetPresenterListBtn.addEventListener('click', () => {
            availableForPicking = [...students];
            pickedPresenters = [];
            renderPickedPresenters();
            presenterShuffleBox.textContent = "오늘의 발표자는?";
            presenterShuffleBox.classList.remove('text-red-500');
            presenterStatus.textContent = `현재 ${availableForPicking.length}명 중 1명 뽑기`;
        });

        // 초기화
        switchView('seating');
        fetchRecommendation();
    </script>
</body>
</html>
